# Every push to main builds BOTH shipping artifacts (Windows installer + Android
# TV APK) and runs the streaming-server tests. Nothing is published: the point is
# that a push which cannot produce a release fails HERE, loudly, instead of at
# tag time. Download either artifact from the run's summary page to test a build
# before cutting a version.
#
# The release itself is still deliberate: push a `v*` tag -> release.yml.
# Both workflows build Android through the SAME reusable build-android.yml, so
# what CI proves is what a release ships.

name: ci

on:
  push:
    branches: [main]
  workflow_dispatch:

# A newer push to main makes an in-flight build obsolete; do not pay for it.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: crates/streaming-server
          key: server-tests
      # The streaming server is the piece with real test coverage and no Windows
      # or GUI dependency, so it gates every push cheaply.
      - name: Test streaming server
        working-directory: crates/streaming-server
        run: cargo test

  desktop:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            .
            apps/desktop/src-tauri

      - uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa # v0.4.0
        with:
          version: v0.13.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The web bundle is EMBEDDED in the exe at compile time, so it must exist
      # (and be current) before the shell builds.
      - name: Build wasm core
        run: pnpm build:wasm

      - name: Build web app
        run: pnpm --filter rillio run build

      - name: Fetch and bundle libmpv
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/fetch-libmpv-windows.ps1

      # Same action a release uses, minus tagName: with no tag, tauri-action
      # only builds (it creates no release), so this is a true dress rehearsal
      # of the release bundle rather than a compile check.
      - uses: tauri-apps/tauri-action@fce9c6108b31ea247710505d3aaaa893ee6768d4 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop/src-tauri

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: apps/desktop/src-tauri/target/release/bundle/nsis/*-setup.exe
          if-no-files-found: error

  android:
    uses: ./.github/workflows/build-android.yml
    secrets: inherit
