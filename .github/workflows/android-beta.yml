# Build the Android TV APK and publish it as a GitHub PRERELEASE (beta).
#
# Separate from release.yml (the Windows desktop pipeline) on purpose: this ships
# ONLY to GitHub as a prerelease, never touches the website or the desktop
# updater feed (latest.json), and uses a distinct tag namespace so it can never be
# resolved as `releases/latest`.
#
# Trigger: push a tag like `android-v0.1.0-beta.1`, or run manually
# (workflow_dispatch, which builds + uploads the APK as a run artifact only).
#
# Signing: this builds the DEBUG apk, which is self-signed with the Android debug
# key and installs via sideload - fine for a beta testers pull from a Release.
# A Play-ready, release-signed build (upload keystore in repo secrets) is the
# follow-up for a stable channel.
#
# The player needs libmpv.so + its ffmpeg set at runtime; they are gitignored, so
# the "Fetch libmpv (Android)" step stages them from the pinned prebuilt.

name: android-beta

on:
  push:
    tags: ['android-v*']
  workflow_dispatch:

jobs:
  android:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # aarch64-linux-android: the Rust cdylib target for the APK. wasm32: the core.
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown, aarch64-linux-android

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            .
            apps/desktop/src-tauri
          # The Android cdylib is a different target triple than the desktop cache.
          key: android

      - uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa # v0.4.0
        with:
          version: v0.13.1

      # Android SDK cmdline-tools, then the exact NDK + platform + build-tools the
      # gen/android project expects. NDK 27.x matches the local toolchain that
      # produced the committed scaffold.
      - uses: android-actions/setup-android@v3
      - name: Install NDK + platform
        run: |
          sdkmanager --install "ndk;27.2.12479018" "platforms;android-35" "build-tools;35.0.0" "platform-tools"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.2.12479018" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.2.12479018" >> "$GITHUB_ENV"

      - name: Install cargo-ndk + tauri-cli
        uses: cargo-bins/cargo-binstall@main
      - run: cargo binstall -y cargo-ndk tauri-cli

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build wasm core
        run: pnpm build:wasm

      - name: Build web app
        run: pnpm --filter rillio run build

      - name: Fetch libmpv (Android)
        run: bash scripts/fetch-libmpv-android.sh

      # Debug APK (self-signed, sideloadable). --target aarch64 = real-device ABI.
      - name: Build Android APK
        working-directory: apps/desktop/src-tauri
        run: cargo tauri android build --debug --apk --target aarch64

      - name: Collect APK
        id: apk
        run: |
          apk="$(find apps/desktop/src-tauri/gen/android/app/build/outputs/apk -name '*.apk' | head -n1)"
          if [ -z "$apk" ]; then echo "no APK produced" >&2; exit 1; fi
          out="Rillio-AndroidTV-${GITHUB_REF_NAME}.apk"
          cp "$apk" "$out"
          echo "path=$out" >> "$GITHUB_OUTPUT"
          ls -lh "$out"

      # workflow_dispatch (no tag): keep the APK as a run artifact for manual test.
      - name: Upload artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ${{ steps.apk.outputs.path }}

      # tag push: publish a GitHub PRERELEASE (never marked latest).
      - name: Publish prerelease
        if: startsWith(github.ref, 'refs/tags/android-v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'Rillio Android TV ${{ github.ref_name }}'
          body: |
            Beta APK for Android TV (arm64). Sideload with `adb install`.

            Early build: the shared UI, streaming server, and downloads run
            on-device; native mpv/libplacebo playback is in testing (SDR/HDR10
            via hardware decode; 4K Dolby Vision needs a capable SoC). Not on the
            website and not an auto-update - beta testers only.
          prerelease: true
          files: ${{ steps.apk.outputs.path }}
