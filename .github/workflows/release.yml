# Build, sign, and publish a Rillio release: the Windows desktop installer AND
# the Android TV APK, in ONE GitHub Release, plus the desktop updater manifest.
#
# Trigger: push a version tag (`git tag v0.2.0 && git push origin v0.2.0`), or
# run manually. NOT on every push - that would ship an update per commit. Every
# push is built (never released) by ci.yml.
#
# Shape: `desktop` and `android` build in parallel; `publish` waits for both,
# attaches the APK + checksums, and only then flips the draft to published. So
# `releases/latest` never exists in a half-populated state, and a failure on
# either platform leaves a draft rather than a broken public release.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   TAURI_SIGNING_PRIVATE_KEY           output of `tauri signer generate` (private key)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  the password you set for it (empty string if none)
#
# Before tagging: bump `version` in apps/desktop/src-tauri/tauri.conf.json (it is
# the source of truth for BOTH the installer and the APK's versionName).
#
# latest.json note: bundle.targets is ["nsis"], so tauri-action's manifest points
# windows-x86_64 at the NSIS -setup.exe on its own. That is the ROOT FIX for the
# MSI-vs-NSIS patch that had to be applied by hand on every release through
# v0.1.24 - do not put "all"/"msi" back without restoring that manual step.

name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  desktop:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # No version here: it is read from package.json's packageManager field.
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      # This action normally reads the toolchain from its ref name; pinning to a
      # SHA loses that, so the toolchain input below is required.
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      # Cache the cargo registry + each workspace's target dir so a release does
      # not recompile librqbit/tauri/reqwest from scratch every run (that is the
      # bulk of the ~14 min). The wasm core (root) and the desktop shell are
      # separate cargo workspaces; the streaming server compiles into the desktop
      # target as a path dep, so both roots cover everything.
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            .
            apps/desktop/src-tauri

      - uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa # v0.4.0
        with:
          # Pin the wasm-pack version, not `latest`. `latest` is non-deterministic
          # and the action mis-resolves newer releases (e.g. 0.15.0) to an old
          # wasm-pack that lacks the `--no-pack` flag build.mjs uses.
          version: v0.13.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The web build consumes a wasm bundle that is a gitignored build output,
      # so it must be generated from source first (see memory/wasm-build-fix).
      - name: Build wasm core
        run: pnpm build:wasm

      - name: Build web app
        run: pnpm --filter rillio run build

      - name: Fetch and bundle libmpv
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/fetch-libmpv-windows.ps1

      - uses: tauri-apps/tauri-action@fce9c6108b31ea247710505d3aaaa893ee6768d4 # v0 (latest; older pins fail release creation with "Resource not accessible")
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop/src-tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'Rillio ${{ github.ref_name }}'
          releaseBody: |
            **Windows:** download `RillioSetup.exe` below. Existing installs update automatically.

            **Android TV:** sideload `Rillio-AndroidTV.apk` (universal: arm64, arm32, x86_64).
            Not an auto-update channel; uninstall any previous build first, the beta signing key is per-build.
          # Stays a draft until the Android build lands too - `publish` flips it.
          releaseDraft: true
          prerelease: false

      # Publish the installer under clean names: RillioSetup-<version>.exe (the
      # human-facing versioned file) and RillioSetup.exe (a version-stable copy so
      # the website can link to releases/latest/download/RillioSetup.exe).
      - name: Publish named installers
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          $exe = Get-ChildItem apps/desktop/src-tauri/target/release/bundle/nsis/*-setup.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $exe) { throw "no NSIS installer produced" }
          $ver = ($env:TAG_NAME).TrimStart('v')
          Copy-Item $exe.FullName "RillioSetup-$ver.exe"
          Copy-Item $exe.FullName "RillioSetup.exe"
          gh release upload $env:TAG_NAME "RillioSetup-$ver.exe" "RillioSetup.exe" --clobber --repo ${{ github.repository }}

  android:
    uses: ./.github/workflows/build-android.yml
    secrets: inherit

  publish:
    needs: [desktop, android]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: android-apk

      # Version-stable name for the website + a versioned copy, mirroring the
      # installer's two names.
      - name: Attach the APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          ver="${TAG_NAME#v}"
          cp Rillio-AndroidTV.apk "Rillio-AndroidTV-$ver.apk"
          gh release upload "$TAG_NAME" "Rillio-AndroidTV.apk" "Rillio-AndroidTV-$ver.apk" \
            --clobber --repo "${{ github.repository }}"

      # First-install integrity: the updater verifies signatures on updates, but
      # a download from the website has no check without this file. Covers both
      # platforms, so it runs here rather than in either build job.
      - name: Publish SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          ver="${TAG_NAME#v}"
          gh release download "$TAG_NAME" --repo "${{ github.repository }}" \
            --pattern 'RillioSetup*.exe' --dir . --clobber
          : > SHA256SUMS.txt
          for f in "RillioSetup-$ver.exe" RillioSetup.exe "Rillio-AndroidTV-$ver.apk" Rillio-AndroidTV.apk; do
            [ -f "$f" ] || { echo "$f not found, cannot hash" >&2; exit 1; }
            sha256sum "$f" >> SHA256SUMS.txt
          done
          cat SHA256SUMS.txt
          gh release upload "$TAG_NAME" SHA256SUMS.txt --clobber --repo "${{ github.repository }}"

      # Everything is attached: make it public and resolvable as
      # releases/latest (what the updater feed and the website links read).
      - name: Publish the release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: gh release edit "$TAG_NAME" --draft=false --latest --repo "${{ github.repository }}"

      # The updater feed is the one asset a mistake here breaks silently, so
      # assert on the PUBLISHED release: 0.x.y matching the tag, and a Windows
      # entry pointing at the NSIS installer (never the MSI).
      - name: Verify the updater feed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          ver="${TAG_NAME#v}"
          gh release download "$TAG_NAME" --repo "${{ github.repository }}" \
            --pattern latest.json --dir feed --clobber
          got_ver="$(jq -r .version feed/latest.json)"
          got_url="$(jq -r '.platforms["windows-x86_64"].url' feed/latest.json)"
          echo "latest.json: version=$got_ver url=$got_url"
          [ "$got_ver" = "$ver" ] || { echo "version mismatch: $got_ver != $ver" >&2; exit 1; }
          case "$got_url" in
            *-setup.exe) ;;
            *) echo "windows-x86_64 must point at the NSIS -setup.exe, got $got_url" >&2; exit 1;;
          esac
