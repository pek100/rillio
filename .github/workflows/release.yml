# Build, sign, and publish a Rillio desktop release + the updater manifest.
#
# Trigger: push a version tag (e.g. `git tag v0.2.0 && git push origin v0.2.0`),
# or run manually. Do NOT trigger on every push — that would ship an update per
# commit.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   TAURI_SIGNING_PRIVATE_KEY           output of `tauri signer generate` (private key)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  the password you set for it (empty string if none)
# and, in apps/desktop/src-tauri/tauri.conf.json, replace:
#   plugins.updater.pubkey   -> the PUBLIC key from `tauri signer generate`
#   plugins.updater.endpoints -> https://github.com/pek100/rillio/releases/latest/download/latest.json
#
# tauri-action builds the installer, signs it + the update artifact, uploads them
# and a generated `latest.json` to a GitHub Release (created as a draft so you can
# review before publishing — the updater resolves `releases/latest/...` only once
# the release is published).
#
# NOTE: playback needs libmpv-2.dll at runtime. It is gitignored and NOT bundled
# here yet — wire it as a bundle resource before shipping to end users.

name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The web build consumes a wasm bundle that is a gitignored build output,
      # so it must be generated from source first (see memory/wasm-build-fix).
      - name: Build wasm core
        run: pnpm build:wasm

      - name: Build web app
        run: pnpm --filter rillio run build

      # Playback needs libmpv-2.dll next to the exe (loaded at runtime via
      # libloading; see mpv.rs default_dll_path). Fetch an official shared build
      # and inject it as a bundle resource here rather than in the committed
      # config, so a normal `cargo build` (no DLL on disk) still works locally.
      # NOTE: these builds are GPL; shipping the DLL carries the usual GPL source
      # obligations. This step is unverified end-to-end, expect to adjust it.
      - name: Fetch and bundle libmpv
        shell: pwsh
        run: |
          $rel = Invoke-RestMethod "https://api.github.com/repos/shinchiro/mpv-winbuild-cmake/releases/latest" -Headers @{ Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}"; 'User-Agent' = 'rillio-ci' }
          $asset = $rel.assets | Where-Object { $_.name -match '^mpv-dev-x86_64-\d' } | Select-Object -First 1
          if (-not $asset) { throw "no mpv-dev-x86_64 asset in latest shinchiro release" }
          Write-Host "downloading $($asset.name)"
          Invoke-WebRequest $asset.browser_download_url -OutFile mpv-dev.7z
          7z e mpv-dev.7z libmpv-2.dll -o"apps/desktop/src-tauri" -y
          if (-not (Test-Path apps/desktop/src-tauri/libmpv-2.dll)) { throw "libmpv-2.dll not extracted" }
          $cfgPath = "apps/desktop/src-tauri/tauri.conf.json"
          $cfg = Get-Content $cfgPath -Raw | ConvertFrom-Json
          $cfg.bundle | Add-Member -NotePropertyName resources -NotePropertyValue @('libmpv-2.dll') -Force
          $cfg | ConvertTo-Json -Depth 30 | Set-Content $cfgPath -Encoding utf8
          Write-Host "injected libmpv-2.dll into bundle.resources"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop/src-tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'Rillio ${{ github.ref_name }}'
          releaseBody: 'Download the installer for your platform below. Existing installs update automatically.'
          releaseDraft: true
          prerelease: false
