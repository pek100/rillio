# Build, sign, and publish a Rillio desktop release + the updater manifest.
#
# Trigger: push a version tag (e.g. `git tag v0.2.0 && git push origin v0.2.0`),
# or run manually. Do NOT trigger on every push, that would ship an update per
# commit.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   TAURI_SIGNING_PRIVATE_KEY           output of `tauri signer generate` (private key)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  the password you set for it (empty string if none)
# and, in apps/desktop/src-tauri/tauri.conf.json, replace:
#   plugins.updater.pubkey   -> the PUBLIC key from `tauri signer generate`
#   plugins.updater.endpoints -> https://github.com/pek100/rillio/releases/latest/download/latest.json
#
# tauri-action builds the installer, signs it + the update artifact, uploads them
# and a generated `latest.json` to a GitHub Release (created as a draft so you can
# review before publishing, the updater resolves `releases/latest/...` only once
# the release is published).
#
# NOTE: playback needs libmpv-2.dll at runtime. It is gitignored; the "Fetch and
# bundle libmpv" step below downloads a pinned, sha256-verified build and injects
# it as a bundle resource.

name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # No version here: it is read from package.json's packageManager field.
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      # This action normally reads the toolchain from its ref name; pinning to a
      # SHA loses that, so the toolchain input below is required.
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa # v0.4.0
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The web build consumes a wasm bundle that is a gitignored build output,
      # so it must be generated from source first (see memory/wasm-build-fix).
      - name: Build wasm core
        run: pnpm build:wasm

      - name: Build web app
        run: pnpm --filter rillio run build

      # Playback needs libmpv-2.dll next to the exe (loaded at runtime via
      # libloading; see mpv.rs default_dll_path). Fetch an official shared build
      # and inject it as a bundle resource here rather than in the committed
      # config, so a normal `cargo build` (no DLL on disk) still works locally.
      # NOTE: these builds are GPL; shipping the DLL carries the usual GPL source
      # obligations.
      - name: Fetch and bundle libmpv
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Bumping mpv: update these three values together. The sha256 is the
          # asset's `digest` field on
          # api.github.com/repos/shinchiro/mpv-winbuild-cmake/releases/tags/<tag>
          MPV_RELEASE_TAG: '20260610'
          MPV_ASSET_NAME: 'mpv-dev-x86_64-20260610-git-304426c.7z'
          MPV_SHA256: '8cbb25ea784f01afbb3f904217cab1317430a8bcfd5680fd827a866367f71cc9'
        run: |
          $rel = Invoke-RestMethod "https://api.github.com/repos/shinchiro/mpv-winbuild-cmake/releases/tags/$($env:MPV_RELEASE_TAG)" -Headers @{ Authorization = "Bearer $env:GITHUB_TOKEN"; 'User-Agent' = 'rillio-ci' }
          $asset = $rel.assets | Where-Object { $_.name -eq $env:MPV_ASSET_NAME } | Select-Object -First 1
          if (-not $asset) { throw "asset $($env:MPV_ASSET_NAME) not found in shinchiro release $($env:MPV_RELEASE_TAG)" }
          Write-Host "downloading $($asset.name)"
          Invoke-WebRequest $asset.browser_download_url -OutFile mpv-dev.7z
          $actual = (Get-FileHash mpv-dev.7z -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actual -ne $env:MPV_SHA256) {
            Write-Host "SHA256 mismatch for $($env:MPV_ASSET_NAME): expected $($env:MPV_SHA256), got $actual"
            exit 1
          }
          7z e mpv-dev.7z libmpv-2.dll -o"apps/desktop/src-tauri" -y
          if (-not (Test-Path apps/desktop/src-tauri/libmpv-2.dll)) { throw "libmpv-2.dll not extracted" }
          $cfgPath = "apps/desktop/src-tauri/tauri.conf.json"
          $cfg = Get-Content $cfgPath -Raw | ConvertFrom-Json
          $cfg.bundle | Add-Member -NotePropertyName resources -NotePropertyValue @('libmpv-2.dll') -Force
          $cfg | ConvertTo-Json -Depth 30 | Set-Content $cfgPath -Encoding utf8
          Write-Host "injected libmpv-2.dll into bundle.resources"

      - uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop/src-tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'Rillio ${{ github.ref_name }}'
          releaseBody: 'Download the installer below. Existing installs update automatically.'
          releaseDraft: true
          prerelease: false

      # Publish the installer under clean names: RillioSetup-<version>.exe (the
      # human-facing versioned file) and RillioSetup.exe (a version-stable copy so
      # the website can link to releases/latest/download/RillioSetup.exe). Works
      # once the draft above is published.
      - name: Publish named installers
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          $exe = Get-ChildItem apps/desktop/src-tauri/target/release/bundle/nsis/*-setup.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $exe) { throw "no NSIS installer produced" }
          $ver = ($env:TAG_NAME).TrimStart('v')
          Copy-Item $exe.FullName "RillioSetup-$ver.exe"
          Copy-Item $exe.FullName "RillioSetup.exe"
          gh release upload $env:TAG_NAME "RillioSetup-$ver.exe" "RillioSetup.exe" --clobber --repo ${{ github.repository }}

      # First-install integrity: the updater verifies signatures on updates, but
      # the initial download from the website has no check without this file.
      - name: Publish SHA256SUMS
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          $ver = ($env:TAG_NAME).TrimStart('v')
          $lines = foreach ($f in @("RillioSetup-$ver.exe", 'RillioSetup.exe')) {
            if (-not (Test-Path $f)) { throw "$f not found, cannot hash" }
            $hash = (Get-FileHash $f -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $f"
          }
          [IO.File]::WriteAllText((Join-Path $PWD 'SHA256SUMS.txt'), (($lines -join "`n") + "`n"))
          Get-Content SHA256SUMS.txt
          gh release upload $env:TAG_NAME SHA256SUMS.txt --clobber --repo ${{ github.repository }}
