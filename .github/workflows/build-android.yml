# Reusable: build + sign the Android TV APK and hand it back as a run artifact.
#
# Called by ci.yml (every push to main) and release.yml (tag v*). It never
# publishes anything itself, so there is exactly ONE Android build definition and
# CI cannot drift from what a release ships.
#
# ABIs: UNIVERSAL (arm64-v8a + armeabi-v7a + x86_64). An arm64-only APK is
# rejected at install time on any other device with "this phone doesn't support
# this app" - the beta shipped arm64-only and hit exactly that. The libmpv
# prebuilt AAR carries all of these, so the coverage is free apart from build
# time.
#
# Signing: a throwaway debug keystore, so the APK sideloads. NOTE: the key is
# regenerated per run, so an installed copy must be UNINSTALLED before a newer
# APK installs over it (Android refuses a signature change). A persistent
# upload keystore in repo secrets is the fix when there is a stable channel.

name: build-android

on:
  workflow_call:
    inputs:
      artifact-name:
        description: Name of the uploaded APK artifact.
        required: false
        default: android-apk
        type: string

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # One Rust target per packaged ABI, plus wasm32 for the core.
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown, aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            .
            apps/desktop/src-tauri
          # The Android cdylibs are different target triples than the desktop cache.
          key: android

      - uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa # v0.4.0
        with:
          version: v0.13.1

      # Android SDK cmdline-tools, then the exact NDK + platform + build-tools the
      # gen/android project expects. NDK 27.x matches the local toolchain that
      # produced the committed scaffold.
      - uses: android-actions/setup-android@v3
      - name: Install NDK + platform
        run: |
          sdkmanager --install "ndk;27.2.12479018" "platforms;android-35" "build-tools;35.0.0" "platform-tools"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.2.12479018" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.2.12479018" >> "$GITHUB_ENV"

      - name: Install cargo-ndk + tauri-cli
        uses: cargo-bins/cargo-binstall@main
        # --force: rust-cache (cache-bin: true) restores .crates.toml from the
        # prior run, so a plain binstall SKIPS the install thinking the tools are
        # present, but the actual ~/.cargo/bin binaries are not always restored ->
        # `cargo tauri` then "no such command". Force a real install every run.
      - run: |
          cargo binstall -y --force cargo-ndk tauri-cli
          cargo tauri --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build wasm core
        run: pnpm build:wasm

      - name: Build web app
        run: pnpm --filter rillio run build

      # libmpv.so + its ffmpeg set are gitignored, so stage them (all packaged
      # ABIs) before the APK build.
      - name: Fetch libmpv (Android)
        run: bash scripts/fetch-libmpv-android.sh

      # Multiple --target values make Tauri emit ONE universal APK carrying every
      # ABI. Release (not debug) strips the ~278MB cdylib debuginfo.
      - name: Build Android APK
        working-directory: apps/desktop/src-tauri
        run: cargo tauri android build --apk --target aarch64 armv7 x86_64

      # The release APK is unsigned; zipalign + sign so it sideloads.
      - name: Sign APK
        id: apk
        run: |
          set -euo pipefail
          bt="$(ls -d "$ANDROID_SDK_ROOT"/build-tools/* | sort -V | tail -n1)"
          # Prefer the universal APK; a single-ABI build would name it per-ABI.
          unsigned="$(find apps/desktop/src-tauri/gen/android/app/build/outputs/apk -name '*universal*-release-unsigned.apk' | head -n1)"
          if [ -z "$unsigned" ]; then
            unsigned="$(find apps/desktop/src-tauri/gen/android/app/build/outputs/apk -name '*-release-unsigned.apk' | head -n1)"
          fi
          if [ -z "$unsigned" ]; then echo "no release APK produced" >&2; exit 1; fi
          ks="$RUNNER_TEMP/debug.keystore"
          keytool -genkeypair -keystore "$ks" -storepass android -keypass android \
            -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
          aligned="$RUNNER_TEMP/aligned.apk"
          "$bt/zipalign" -f -p 4 "$unsigned" "$aligned"
          out="Rillio-AndroidTV.apk"
          "$bt/apksigner" sign --ks "$ks" --ks-pass pass:android --key-pass pass:android \
            --ks-key-alias androiddebugkey --out "$out" "$aligned"
          "$bt/apksigner" verify "$out"
          # Fail loud if the ABI set regressed: an arm64-only APK is the bug this
          # universal build exists to prevent, and it is invisible until a user
          # cannot install it.
          abis="$(unzip -l "$out" | grep -o 'lib/[^/]*' | sort -u | cut -d/ -f2 | paste -sd, -)"
          echo "packaged ABIs: $abis"
          for required in arm64-v8a armeabi-v7a x86_64; do
            case ",$abis," in *",$required,"*) ;; *) echo "missing ABI $required" >&2; exit 1;; esac
          done
          echo "path=$out" >> "$GITHUB_OUTPUT"
          ls -lh "$out"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error
