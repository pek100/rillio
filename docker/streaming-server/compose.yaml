name: stremio

services:
  streaming-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: stremio/streaming-server:4.20.16

    # Loopback only. The container answers `Access-Control-Allow-Origin: *`
    # (NO_CORS=1), so binding it to 0.0.0.0 would hand any host on your network
    # an unauthenticated torrent engine. Do not change the left-hand side.
    ports:
      - "127.0.0.1:11470:11470"

    # --- containment -------------------------------------------------------
    read_only: true                 # rootfs immutable; server.js writes only below
    cap_drop: [ALL]                 # it binds >1024 and needs nothing else
    security_opt:
      - no-new-privileges:true
    tmpfs:
      # HLS segments and ffmpeg scratch. noexec/nosuid matter here: this is the
      # one writable path an ffmpeg parser bug could try to drop a payload into.
      - /tmp:rw,noexec,nosuid,nodev,size=1g
    volumes:
      # Torrent cache + server settings.
      #
      # Do NOT set `nocopy: true` here. It stops Docker seeding the fresh volume
      # from the image, so an empty root-owned dir gets mounted over the
      # `chown node:node /data` done in the Dockerfile, and the unprivileged
      # server cannot write its cache. server.js wraps that mkdir in a bare
      # try/catch, so it fails *silently* and the healthcheck still passes.
      #
      # This mount is not noexec: Docker cannot portably apply mount flags to a
      # named volume. Payloads here are inert data and the process runs as uid
      # 1000 with no capabilities and a read-only rootfs, so the residual risk is
      # a payload being executed by something *outside* this container.
      - type: volume
        source: cache
        target: /data

    # Torrent traffic is outbound-only in this configuration. The engine picks an
    # ephemeral port and does not accept inbound peers, so you leech without
    # seeding back. Publishing a listen port would improve swarm health at the
    # cost of an inbound surface on the least trustworthy process in the project.
    restart: unless-stopped

    # Bound the blast radius of a decompression bomb or a runaway transcode.
    mem_limit: 2g
    pids_limit: 512

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:11470/settings >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  cache:
