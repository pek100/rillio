<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" role="img" aria-label="Nothing here yet">
  <!-- the rill, dried up: what were ripples are now a flat, empty bed -->
  <g stroke="#FFFFFF" stroke-width="2" stroke-linecap="round">
    <path d="M44 170h112" stroke-opacity="0.085"/>
    <path d="M62 181h76" stroke-opacity="0.055"/>
    <path d="M80 190h40" stroke-opacity="0.035"/>
  </g>

  <!-- cactus: a hairline outline drawn under a darker fill stroke -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <g stroke="#FFFFFF" stroke-opacity="0.14" stroke-width="24">
      <path d="M100 160V80"/>
      <path d="M100 124H82v-22"/>
      <path d="M100 138h18v-20"/>
    </g>
    <g stroke="#0A1017" stroke-width="20">
      <path d="M100 160V80"/>
      <path d="M100 124H82v-22"/>
      <path d="M100 138h18v-20"/>
    </g>
  </g>

  <!-- a faint ridge down the trunk -->
  <path d="M100 96v56" stroke="#FFFFFF" stroke-opacity="0.07" stroke-width="1.5" stroke-linecap="round"/>

  <!-- the one accent: a bloom -->
  <circle cx="100" cy="64" r="6" fill="#FFA033"/>

  <!-- pebbles in the dry bed -->
  <circle cx="55" cy="163" r="3" fill="#FFFFFF" fill-opacity="0.10"/>
  <circle cx="146" cy="165" r="2.4" fill="#FFFFFF" fill-opacity="0.075"/>
</svg>
